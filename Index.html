<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Flipping CRM v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f8;
}

header {
  background: #111827;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container { padding: 15px; }

.card {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover { background: #1d4ed8; }

.item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.small { font-size: 12px; color: gray; }

.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  background: #e5e7eb;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>🏠 Flipping CRM v2</header>

<div class="container">

<!-- IMMOBILE -->
<div class="card">
<h3>➕ Nuovo immobile</h3>

<input id="name" placeholder="Nome (es. Via Roma 12)">
<input id="address" placeholder="Indirizzo">
<input id="price" placeholder="Prezzo acquisto (€)">
<input id="budget" placeholder="Budget ristrutturazione (€)">

<select id="status">
  <option>Idea</option>
  <option>In trattativa</option>
  <option>Ristrutturazione</option>
  <option>In vendita</option>
  <option>Venduto</option>
</select>

<textarea id="notes" placeholder="Note progetto"></textarea>

<button onclick="addProperty()">Aggiungi immobile</button>
</div>

<!-- LISTA IMMOBILI -->
<div class="card">
<h3>📋 Immobili</h3>
<div id="list"></div>
</div>

<!-- CONTATTI -->
<div class="card">
<h3>👷 Contatti artigiani</h3>
<textarea id="contacts" placeholder="Es: Idraulico Mario 333xxxx"></textarea>
<button onclick="saveContacts()">Salva contatti</button>
</div>

</div>

<script>

let properties = JSON.parse(localStorage.getItem("properties")) || [];
let contacts = localStorage.getItem("contacts") || "";

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  properties.forEach((p, i) => {
    list.innerHTML += `
      <div class="item" onclick="openItem(${i})">
        <strong>${p.name}</strong><br>
        <div class="small">${p.address}</div>

        <div class="small">
          Prezzo: €${p.price || 0} | Budget: €${p.budget || 0}
        </div>

        <div class="badge">${p.status}</div>
      </div>
    `;
  });

  document.getElementById("contacts").value = contacts;
}

function addProperty() {

  const p = {
    name: document.getElementById("name").value,
    address: document.getElementById("address").value,
    price: document.getElementById("price").value,
    budget: document.getElementById("budget").value,
    status: document.getElementById("status").value,
    notes: document.getElementById("notes").value
  };

  if (!p.name) return alert("Inserisci nome immobile");

  properties.push(p);

  localStorage.setItem("properties", JSON.stringify(properties));

  document.querySelectorAll("input, textarea").forEach(el => el.value = "");
  render();
}

function openItem(i) {
  const p = properties[i];
  alert(
`🏠 ${p.name}

📍 ${p.address}
💰 Prezzo: €${p.price}
🛠️ Budget: €${p.budget}
📊 Stato: ${p.status}

📝 Note:
${p.notes}`
  );
}

function saveContacts() {
  contacts = document.getElementById("contacts").value;
  localStorage.setItem("contacts", contacts);
  alert("Contatti salvati");
}

render();

</script>

</body>
</html>
