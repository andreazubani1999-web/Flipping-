<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Flipping CRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #111827;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #2563eb;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #1d4ed8;
    }

    .item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .item:hover {
      background: #f1f5f9;
    }

    .small {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>🏠 Flipping CRM</header>

<div class="container">

  <div class="card">
    <h3>➕ Aggiungi immobile</h3>
    <input id="name" placeholder="Nome immobile (es. Via Roma 12)">
    <textarea id="notes" placeholder="Note (costi, idee, stato lavori)"></textarea>
    <button onclick="addProperty()">Salva immobile</button>
  </div>

</div>

<script>
let properties = JSON.parse(localStorage.getItem("properties")) || [];
let contacts = localStorage.getItem("contacts") || "";

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  properties.forEach((p, index) => {
    list.innerHTML += `
      <div class="item" onclick="openItem(${index})">
        <strong>${p.name}</strong>
        <div class="small">${p.notes.substring(0, 60)}...</div>
      </div>
    `;
  });

  document.getElementById("contacts").value = contacts;
}

function addProperty() {
  const name = document.getElementById("name").value;
  const notes = document.getElementById("notes").value;

  if (!name) return alert("Inserisci un nome");

  properties.push({ name, notes });

  localStorage.setItem("properties", JSON.stringify(properties));

  document.getElementById("name").value = "";
  document.getElementById("notes").value = "";

  render();
}

function openItem(i) {
  alert(
    "🏠 " + properties[i].name + "\n\n" +
    properties[i].notes
  );
}

function saveContacts() {
  contacts = document.getElementById("contacts").value;
  localStorage.setItem("contacts", contacts);
  alert("Contatti salvati");
}

render();
</script>
