<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipping App</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f0e8;color:#2f2a26}
.app{min-height:100vh;padding:20px;background:radial-gradient(circle at top left,#c8b59f55,transparent 34%),radial-gradient(circle at top right,#8f9b8250,transparent 36%),linear-gradient(135deg,#f5f0e8,#ece4d8)}
.hidden{display:none!important}
.top{margin-bottom:20px}
.label{font-size:12px;font-weight:900;color:#7a8b64;letter-spacing:1px;text-transform:uppercase}
h1{font-size:33px;margin:7px 0;line-height:1.05;color:#2f2a26}
h2,h3{margin:0 0 7px;color:#2f2a26}
p{color:#746b62;line-height:1.45}
.subtitle{color:#746b62;font-size:15px}
.card,.reader-card{background:#fffdf8;border-radius:24px;padding:22px;box-shadow:0 16px 42px rgba(55,45,38,.12);margin-bottom:14px;border:1px solid #e6dccf}
.home-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:14px}
.section-card{display:flex;gap:14px;align-items:center;cursor:pointer;padding:19px;border-radius:22px;min-height:112px;margin-bottom:0}
.section-card h2{font-size:20px;margin:0}
.section-card p{margin:4px 0;font-size:14px;line-height:1.35}
.icon{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#3b332f,#8f9b82);flex-shrink:0;color:#fffdf8;box-shadow:0 12px 24px rgba(59,51,47,.18)}
.icon svg{width:27px;height:27px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.btn{border:none;border-radius:14px;padding:12px 15px;font-weight:800;cursor:pointer;background:#3b332f;color:#fffdf8;margin:5px 5px 5px 0;font-size:14px}
.btn.light{background:#fffdf8;color:#3b332f;border:1px solid #d8cbbb}
.btn.green{background:#7a8b64}
.btn.blue{background:#3b332f}
.btn.danger{background:#b5533f}
input,textarea,select{width:100%;border:1px solid #d8cbbb;border-radius:16px;padding:13px;font-size:16px;margin:6px 0 13px;font-family:inherit;background:#fffdf8;color:#2f2a26}
textarea{min-height:140px;resize:vertical;line-height:1.6}
.field-label{font-size:12px;font-weight:900;color:#6f6258;text-transform:uppercase;letter-spacing:.4px;margin-top:9px}
.item{background:#fffdf8;border-radius:19px;padding:16px;margin-bottom:12px;box-shadow:0 9px 26px rgba(55,45,38,.10);border:1px solid #e6dccf;cursor:pointer}
.actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.small{font-size:12px;color:#9a8f84;margin-top:6px}
.breadcrumb{font-size:13px;color:#7a7068;margin-bottom:10px}
.reader-title{font-size:30px;margin-bottom:14px;color:#2f2a26}
.reader-content{white-space:pre-wrap;font-size:17px;line-height:1.7;color:#3b332f}
.empty{color:#9a8f84;font-style:italic}
.field-group{margin-top:20px;padding-top:12px;border-top:1px solid #e6dccf}
.field-title{font-size:18px;font-weight:900;margin-bottom:10px;color:#2f2a26}
.info-row{margin-bottom:13px}
.info-label{font-size:12px;font-weight:900;color:#7a7068;text-transform:uppercase;letter-spacing:.5px}
.info-value{font-size:16px;color:#2f2a26;white-space:pre-wrap;margin-top:4px;word-break:break-word}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#e8e0d3;color:#5f4f44;font-weight:900;font-size:12px;margin-top:6px}
.readonly{background:#f5f0e8;color:#6f6258}
.checkrow{display:flex;gap:10px;align-items:center;margin:10px 0;color:#2f2a26}
.checkrow input{width:auto;margin:0}
.hero{background:radial-gradient(circle at top left,#c8b59f66,transparent 35%),radial-gradient(circle at top right,#8f9b8266,transparent 35%),linear-gradient(135deg,#3b332f,#6f6258);border-radius:28px;padding:24px;margin-bottom:17px;box-shadow:0 22px 55px rgba(55,45,38,.25);color:#fffdf8}
.hero .label{color:#d9c9b8}.hero p,.hero .subtitle{color:#eee5db}.hero h1{color:#fffdf8}
.pro-card{background:linear-gradient(135deg,#fffdf8,#f7f2ea);border:1px solid #e6dccf}
.order-buttons{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.reader-image{width:100%;border-radius:20px;margin:18px 0;box-shadow:0 16px 38px rgba(55,45,38,.18);border:1px solid #e6dccf}
.inline-edit-box{margin-top:14px;background:#f7f2ea;border:1px solid #e6dccf;border-radius:22px;padding:16px}
.big-textarea{min-height:520px!important;font-size:17px;line-height:1.75;background:#fffdf8}
.form-textarea{min-height:220px!important}
.image-box{background:#f7f2ea;border:1px solid #e6dccf;border-radius:18px;padding:12px;margin:12px 0}
.image-preview{width:100%;max-height:520px;object-fit:cover;border-radius:18px;margin:12px 0;box-shadow:0 10px 26px rgba(55,45,38,.16);border:1px solid #e6dccf}
.editor-note{background:#ede5d9;border:1px solid #d8cbbb;color:#5f4f44;padding:12px;border-radius:16px;font-size:14px;margin:10px 0 16px}
</style>
</head>
<body>
<div class="app">

<section id="home">
<div class="top"><div class="label">Flipping Immobiliare</div><h1 id="homeTitle"></h1><p class="subtitle" id="homeSubtitle"></p></div>
<button class="btn blue" onclick="openHomeEdit()">Modifica homepage</button>
<button class="btn green" onclick="addCustomSection()">+ Nuova sezione</button>
<div id="homeSections" class="home-grid"></div>
</section>

<section id="homeEdit" class="hidden">
<button class="btn light" onclick="goHome()">← Indietro</button>
<div class="card"><h2>Modifica homepage</h2><div class="field-label">Titolo homepage</div><input id="editHomeTitle" oninput="saveHomeInfo()"><div class="field-label">Descrizione homepage</div><textarea id="editHomeSubtitle" oninput="saveHomeInfo()"></textarea></div>
</section>

<section id="sectionView" class="hidden">
<button class="btn light" onclick="goHome()">← Home</button>
<div id="sectionHeader" class="top"><div class="label">Sezione</div><h1 id="sectionTitle"></h1><p class="subtitle" id="sectionDescription"></p></div>
<button class="btn blue" onclick="openSectionEdit()">Modifica sezione</button>
<button class="btn green" onclick="addPage(null)">+ Nuova pagina</button>
<div id="pagesList"></div>
</section>

<section id="sectionEdit" class="hidden">
<button class="btn light" onclick="backToSection()">← Indietro</button>
